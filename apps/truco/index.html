<!DOCTYPE html>
<html lang="es-AR" data-theme="noche">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1115">
<title>Truco Vichen</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="../../assets/icons/favicon.png">
<link rel="apple-touch-icon" href="../../assets/icons/truco-apple.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Truco Vichen">
<meta name="description" content="Anotador de Truco de Vichen: fósforos, malas y buenas, partido a 12–30. Offline.">
<script>(function(){try{var r=localStorage.getItem("vichen:theme:current");var t=r?JSON.parse(r).d:"noche";if(t!=="noche"&&t!=="dia")t="noche";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{ --fsize:min(46px,11vw); --gap:9px; }
body{display:flex;flex-direction:column;min-height:100dvh;overflow-x:hidden;-webkit-user-select:none;user-select:none}

/* Cabecera */
.appbar{position:relative;padding:calc(11px + var(--safe-top)) 16px 2px;text-align:center}
.appbar .kicker{font-weight:800;letter-spacing:.2em;text-transform:uppercase;font-size:10px;color:var(--ink-faint)}
.appbar .kicker b{color:var(--accent-text)}
.appbar h1{font-family:var(--serif);font-weight:600;font-size:clamp(22px,6vw,32px);letter-spacing:-.01em;margin-top:1px}
.appbar .set{position:absolute;top:calc(9px + var(--safe-top));right:14px}

.status{text-align:center;padding:5px 16px 2px;font-size:12.5px;color:var(--ink-soft)}
.status b{color:var(--ink);font-weight:600}
.status .amber{color:var(--accent-text);font-weight:600}

/* Tablero */
main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px;max-width:660px;width:100%;margin:6px auto 0;padding:0 10px}
.team{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r-3);box-shadow:var(--shadow-1);
  padding:12px 9px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.team.lead{border-color:color-mix(in srgb,var(--accent) 45%,var(--hair))}
.team.lead::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.tname{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:5px;border-radius:var(--r-1);color:var(--ink-soft);transition:color var(--dur-1),background var(--dur-1)}
.tname:hover{color:var(--ink);background:var(--surface-2)}
.tname .mk{display:inline-flex;color:var(--accent-text)}
.tname .mk svg{width:20px;height:20px}
.tname .nm{font-weight:600;font-size:13px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:9em}
.tname .ed{color:var(--ink-faint);display:inline-flex;opacity:0;transition:opacity var(--dur-1)}
.tname:hover .ed{opacity:1}
.tname .ed svg{width:13px;height:13px}

.score{font-family:var(--serif);font-weight:600;font-size:clamp(52px,16vw,90px);line-height:.9;text-align:center;
  color:var(--ink);cursor:pointer;margin:2px 0 0;font-variant-numeric:lining-nums}
.score:active{transform:scale(.97)}
.tstat{display:flex;flex-direction:column;align-items:center;gap:0;margin:3px 0 8px;min-height:15px}
.badge{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);line-height:1.3}
.badge.buenas{color:var(--accent-text)}
.badge:empty{display:none}
.left{font-size:11px;color:var(--ink-soft);line-height:1.3}
.left:empty{display:none}

.fos{display:flex;flex-direction:column;gap:7px;padding:8px 0 0}
.team.no-fos .fos{display:none}
.slabel{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);display:block;margin-bottom:5px;text-align:center}
.cuadros{display:flex;flex-wrap:wrap;gap:var(--gap);justify-content:center;width:calc(2 * var(--fsize) + var(--gap));margin:0 auto}
.cuad{width:var(--fsize);height:var(--fsize);flex:0 0 auto}
.cuad line{stroke:var(--hair-2);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:1;stroke-dashoffset:0}
.cuad .lit line{stroke:var(--ink);stroke-width:2.8}
.cuad .lit.diag line{stroke:var(--accent-strong);stroke-width:4;filter:drop-shadow(0 0 3px var(--accent-tint))}
.cuad .draw line{animation:strike .34s var(--ease) forwards}
@keyframes strike{from{stroke-dashoffset:1;opacity:.15}to{stroke-dashoffset:0;opacity:1}}

.mainpad{display:flex;gap:8px;margin-top:2px}
.mainpad .plus{flex:1}
.mainpad .btn{--h:48px}
.mainpad .iconbtn{--s:48px}

/* Historial */
.log-wrap{max-width:660px;width:100%;margin:2px auto 0;padding:14px 16px calc(18px + var(--safe-bottom))}
.log-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.log-toggle{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
.log-toggle:hover{color:var(--ink)}
.log-toggle svg{width:15px;height:15px;transition:transform var(--dur-2) var(--ease)}
.log-toggle.open svg{transform:rotate(180deg)}
.log{list-style:none;margin:12px 0 0;padding:0;max-height:150px;overflow-y:auto}
.log.hidden{display:none}
.log li{display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--hair);font-size:13.5px}
.log li:last-child{border-bottom:0}
.log li .mk{display:inline-flex;color:var(--accent-text)}
.log li .mk svg{width:16px;height:16px}
.log li .who{font-weight:600}
.log li .what{color:var(--ink-faint);flex:1;font-size:12px}
.log li .amt{font-family:var(--serif);font-weight:600;font-size:16px;color:var(--ink)}
.log li .amt.neg{color:var(--neg)}
.log-empty{padding:18px 2px;font-size:12.5px;color:var(--ink-faint);text-align:center}

/* Contenido de ajustes específico */
.pref-ic{color:var(--ink-soft)}
.win-icon{width:64px;height:64px;margin:6px auto 4px;border-radius:var(--r-3);display:grid;place-items:center;background:var(--accent-tint);color:var(--accent-text)}
.win-icon svg{width:34px;height:34px}
.win-mk{display:inline-flex;color:var(--accent-text);vertical-align:-4px;margin-right:4px}
.win-mk svg{width:22px;height:22px}
.win-fin{font-family:var(--serif);font-size:17px;color:var(--ink-soft);text-align:center;margin:6px 0 2px}
canvas#confetti{position:fixed;inset:0;z-index:95;pointer-events:none}
@media (prefers-reduced-motion:reduce){ .cuad .draw line{animation:none;stroke-dashoffset:0;opacity:1} }
</style>
</head>
<body>

<header class="appbar">
  <div class="kicker">TRUCO · <b>VICHEN</b></div>
  <h1>Truco</h1>
  <button class="iconbtn iconbtn--sm set" id="btn-settings" aria-label="Ajustes"></button>
</header>

<div class="status" id="status"></div>

<main id="board"></main>

<div class="log-wrap">
  <div class="log-head">
    <button class="log-toggle" id="log-toggle">Historial <span id="log-caret"></span></button>
    <button class="btn btn--soft btn--sm" id="btn-undo" disabled></button>
  </div>
  <ul class="log hidden" id="log"></ul>
</div>

<!-- Ajustes -->
<div class="modal" id="m-settings" role="dialog" aria-modal="true" aria-label="Ajustes">
  <div class="sheet">
    <div class="grab"></div>
    <div class="sheet-title">Ajustes</div>
    <div class="sheet-sub">Truco Vichen</div>

    <div class="group">
      <span class="eyebrow">Equipo uno</span>
      <div class="field"><input type="text" id="in-n0" maxlength="14" placeholder="Nosotros"></div>
      <div class="icons-pick" id="ic-0" style="margin-top:10px"></div>
    </div>

    <div class="group">
      <span class="eyebrow">Equipo dos</span>
      <div class="field"><input type="text" id="in-n1" maxlength="14" placeholder="Ellos"></div>
      <div class="icons-pick" id="ic-1" style="margin-top:10px"></div>
    </div>

    <div class="group">
      <span class="eyebrow">Partido a</span>
      <div class="seg" id="limit-opts" role="tablist">
        <button class="seg-opt" data-v="12" role="tab">12</button>
        <button class="seg-opt" data-v="15" role="tab">15</button>
        <button class="seg-opt" data-v="18" role="tab">18</button>
        <button class="seg-opt" data-v="24" role="tab">24</button>
        <button class="seg-opt" data-v="30" role="tab">30</button>
      </div>
    </div>

    <div class="group">
      <span class="eyebrow">Tamaño de fósforos</span>
      <div class="seg" id="size-opts" role="tablist">
        <button class="seg-opt" data-v="chico" role="tab">Chico</button>
        <button class="seg-opt" data-v="medio" role="tab">Medio</button>
        <button class="seg-opt" data-v="grande" role="tab">Grande</button>
      </div>
    </div>

    <div class="group">
      <span class="eyebrow">Tema</span>
      <div class="seg" id="theme-opts" role="tablist">
        <button class="seg-opt" data-v="noche" role="tab">Noche</button>
        <button class="seg-opt" data-v="dia" role="tab">Día</button>
      </div>
    </div>

    <div class="group">
      <span class="eyebrow">Preferencias</span>
      <div class="switch-row"><span class="lbl"><span class="pref-ic" data-ic="zap"></span>Sonidos</span><button class="toggle" id="sw-sound" role="switch"></button></div>
      <div class="switch-row"><span class="lbl"><span class="pref-ic" data-ic="flame"></span>Vibración</span><button class="toggle" id="sw-vibe" role="switch"></button></div>
      <div class="switch-row"><span class="lbl"><span class="pref-ic" data-ic="spade"></span>Mostrar fósforos</span><button class="toggle" id="sw-fosforos" role="switch"></button></div>
      <div class="switch-row"><span class="lbl"><span class="pref-ic" data-ic="layers"></span>Mostrar malas / buenas</span><button class="toggle" id="sw-badge" role="switch"></button></div>
      <div class="switch-row"><span class="lbl"><span class="pref-ic" data-ic="sparkles"></span>Confeti al ganar</span><button class="toggle" id="sw-conf" role="switch"></button></div>
    </div>

    <button class="btn btn--primary btn--block btn--lg" id="btn-apply" style="margin-top:24px">Guardar</button>
    <button class="btn btn--quiet" id="btn-newgame" style="margin:10px auto 0">Reiniciar partido</button>
  </div>
</div>

<!-- Ganador -->
<div class="modal" id="m-win" role="dialog" aria-modal="true" aria-label="Ganador">
  <div class="sheet" style="text-align:center">
    <div class="grab"></div>
    <div class="win-icon" id="win-icon"></div>
    <span class="eyebrow">Ganador</span>
    <div class="sheet-title" id="win-name" style="margin-top:6px"></div>
    <div class="win-fin" id="win-fin"></div>
    <button class="btn btn--primary btn--block btn--lg" id="btn-rev" style="margin-top:20px">Revancha</button>
  </div>
</div>

<canvas id="confetti"></canvas>

<script src="../../assets/js/store.js"></script>
<script src="../../assets/js/registry.js"></script>
<script src="../../assets/js/icons.js"></script>
<script src="../../assets/js/theme.js"></script>
<script src="../../assets/js/pwa.js"></script>
<script src="../../assets/js/shell.js"></script>
<script>
(() => {
"use strict";
const db = Store.namespace("truco", 2);
const $ = s => document.querySelector(s);
const SVG = (n,s)=>Icons.svg(n,{size:s||20});

const ICONS_PICK = ["spade","club","heart","diamond","star","crown","flame","zap","swords","dice"];
const SIZES = { chico:"min(36px,9vw)", medio:"min(42px,10.5vw)", grande:"min(48px,12vw)" };
const DEFAULTS = { limit:30, size:"medio", sound:true, vibe:true, badge:true, conf:true, fosforos:true,
  names:["Nosotros","Ellos"], icons:["spade","heart"] };

const S = Object.assign({}, DEFAULTS, { pts:[0,0], prev:[0,0], hist:[], over:false, logOpen:false });

/* -------- persistencia -------- */
function loadState(){
  const cfg = db.get("settings", null);
  if(cfg){ ["limit","size","sound","vibe","badge","conf","fosforos"].forEach(k=>{ if(cfg[k]!=null) S[k]=cfg[k]; });
    if(Array.isArray(cfg.names)) S.names=cfg.names.slice(0,2);
    if(Array.isArray(cfg.icons)) S.icons=cfg.icons.slice(0,2); }
  const g = db.get("game", null);
  if(g){ if(Array.isArray(g.pts)) S.pts=g.pts.slice(0,2); if(Array.isArray(g.hist)) S.hist=g.hist; S.over=!!g.over; S.prev=[...S.pts]; }
}
let saveT=null;
function save(){ if(saveT)return; saveT=setTimeout(()=>{ saveT=null;
  db.set("settings",{limit:S.limit,size:S.size,sound:S.sound,vibe:S.vibe,badge:S.badge,conf:S.conf,fosforos:S.fosforos,names:S.names,icons:S.icons});
  db.set("game",{pts:S.pts,hist:S.hist,over:S.over}); },0); }

/* -------- sonido / vibración -------- */
let actx=null;
function tone(f,d=.07,g=.045,t="sine"){ if(!S.sound)return;
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),n=actx.createGain();
    o.type=t;o.frequency.value=f;n.gain.setValueAtTime(g,actx.currentTime);
    n.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);
    o.connect(n).connect(actx.destination);o.start();o.stop(actx.currentTime+d);
  }catch(e){} }
const sAdd=()=>tone(600,.055,.035,"triangle");
const sSub=()=>tone(240,.09,.035,"sine");
const sWin=()=>{tone(523,.13,.05);setTimeout(()=>tone(659,.13,.05),140);setTimeout(()=>tone(784,.3,.06),300);};
const buzz=p=>{ if(S.vibe&&navigator.vibrate)navigator.vibrate(p); };

/* -------- fósforos -------- */
const LINES=[[7,7,37,7],[37,7,37,37],[37,37,7,37],[7,37,7,7],[7,7,37,37]];
function matchG(l,lit,isNew){ const [x1,y1,x2,y2]=LINES[l];
  const cls=[(l===4?"diag":""),lit?"lit":"",isNew?"draw":""].join(" ").trim();
  return `<g class="${cls}"><line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" pathLength="1"/></g>`; }
const sections=()=> S.limit%2 ? [["Puntos",S.limit]] : [["Malas",S.limit/2],["Buenas",S.limit/2]];

/* -------- render -------- */
const board = $("#board");
function teamHTML(i){ return `
  <section class="team" data-i="${i}">
    <button class="tname" data-name aria-label="Editar equipo">
      <span class="mk" data-mk></span><span class="nm" data-nm></span><span class="ed">${SVG("pencil",13)}</span>
    </button>
    <div class="score tnum" data-score role="button" aria-label="Sumar 1">0</div>
    <div class="tstat"><span class="badge" data-badge></span><span class="left" data-left></span></div>
    <div class="mainpad">
      <button class="iconbtn" data-act="sub" aria-label="Restar 1">${SVG("minus",20)}</button>
      <button class="btn btn--primary plus" data-act="add">${SVG("plus",19)}Sumar</button>
    </div>
    <div class="fos" data-fos></div>
  </section>`; }
function buildBoard(){
  board.innerHTML=teamHTML(0)+teamHTML(1);
  board.querySelectorAll(".team").forEach(t=>{ const i=+t.dataset.i;
    t.querySelector("[data-score]").addEventListener("click",()=>score(i,1));
    t.querySelector('[data-act="add"]').addEventListener("click",()=>score(i,1));
    t.querySelector('[data-act="sub"]').addEventListener("click",()=>score(i,-1));
    t.querySelector("[data-name]").addEventListener("click",openSettings); });
  renderAll(true);
}
function renderTeam(t,silent){
  const i=+t.dataset.i,pts=S.pts[i],prev=silent?pts:S.prev[i];
  t.querySelector("[data-mk]").innerHTML=SVG(S.icons[i],20);
  t.querySelector("[data-nm]").textContent=S.names[i];
  let g=0,html="";
  for(const [label,count] of sections()){ let cells="";const upto=g+count;
    while(g<upto){ let lines=""; for(let l=0;l<5&&g<upto;l++){const idx=g++;lines+=matchG(l,idx<pts,idx>=prev&&idx<pts);}
      cells+=`<svg class="cuad" viewBox="0 0 44 44" aria-hidden="true">${lines}</svg>`; }
    html+=`<div><span class="slabel">${label}</span><div class="cuadros">${cells}</div></div>`; }
  t.querySelector("[data-fos]").innerHTML=html;
  t.querySelector("[data-score]").textContent=pts;
  const badge=t.querySelector("[data-badge]");
  if(!S.badge||S.limit%2){ badge.textContent=""; badge.className="badge"; }
  else if(pts>=S.limit/2){ badge.textContent="En las buenas"; badge.className="badge buenas"; }
  else { badge.textContent="En las malas"; badge.className="badge"; }
  const rest=S.limit-pts;
  t.querySelector("[data-left]").textContent = rest===0?"" : rest===1?"A un punto" : `Faltan ${rest}`;
  t.querySelector('[data-act="sub"]').disabled=pts<=0||S.over;
  t.querySelector('[data-act="add"]').disabled=S.over||pts>=S.limit;
  t.classList.toggle("no-fos", !S.fosforos);
  t.classList.toggle("lead", !S.over && S.pts[i]>S.pts[1-i] && S.pts[i]>0);
}
function renderAll(silent){
  board.querySelectorAll(".team").forEach(t=>renderTeam(t,silent));
  S.prev=[...S.pts];
  const dif=Math.abs(S.pts[0]-S.pts[1]); const lead=S.pts[0]>S.pts[1]?0:1;
  $("#status").innerHTML = S.pts[0]===S.pts[1]
    ? `Partido a <b>${S.limit}</b> · empate`
    : `Partido a <b>${S.limit}</b> · <span class="amber">${S.names[lead]}</span> +${dif}`;
  renderLog(); save();
}
function bump(i){ const el=board.querySelector(`.team[data-i="${i}"] [data-score]`);
  if(!el)return; el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump"); }

/* -------- lógica -------- */
function score(i,d){ if(S.over)return;
  const next=Math.max(0,Math.min(S.limit,S.pts[i]+d)); const real=next-S.pts[i]; if(!real)return;
  S.prev=[...S.pts];S.pts[i]=next; S.hist.push({t:i,d:real,time:Date.now()});
  real>0?(sAdd(),buzz(11)):(sSub(),buzz(6)); renderAll(false); bump(i);
  if(next>=S.limit)endGame(i); }
function undo(){ if(!S.hist.length||S.over)return; const h=S.hist.pop();
  S.pts[h.t]=Math.max(0,S.pts[h.t]-h.d); sSub();buzz(6);renderAll(true); }
function renderLog(){ const log=$("#log");
  if(!S.hist.length){ log.innerHTML=`<li class="log-empty">Todavía no se anotó nada</li>`; }
  else{ log.innerHTML=S.hist.slice().reverse().map(h=>{ const hh=new Date(h.time).toTimeString().slice(0,5);
    return `<li><span class="mk">${SVG(S.icons[h.t],16)}</span><span class="who">${S.names[h.t]}</span><span class="what">${hh}</span><span class="amt${h.d<0?" neg":""}">${h.d>0?"+":""}${h.d}</span></li>`; }).join(""); }
  $("#btn-undo").disabled=!S.hist.length||S.over; }
$("#log-toggle").addEventListener("click",()=>{ S.logOpen=!S.logOpen;
  $("#log").classList.toggle("hidden",!S.logOpen); $("#log-toggle").classList.toggle("open",S.logOpen); });

/* -------- fin -------- */
function endGame(i){ S.over=true;sWin();buzz([70,40,130]);
  $("#win-icon").innerHTML=SVG("trophy",34);
  $("#win-name").innerHTML=`<span class="win-mk">${SVG(S.icons[i],22)}</span>${S.names[i]}`;
  $("#win-fin").textContent=`${S.names[0]} ${S.pts[0]} — ${S.pts[1]} ${S.names[1]}`;
  $("#m-win").classList.add("show"); if(S.conf)confetti(); renderAll(true); }
function resetGame(){ S.pts=[0,0];S.prev=[0,0];S.hist=[];S.over=false;
  $("#m-win").classList.remove("show");$("#m-settings").classList.remove("show");document.body.style.overflow="";
  stopConfetti();renderAll(true); }

/* -------- confetti -------- */
const cv=$("#confetti"),cx=cv.getContext("2d"); let parts=[],raf=null;
function confetti(){ if(matchMedia("(prefers-reduced-motion: reduce)").matches)return;
  cv.width=innerWidth;cv.height=innerHeight;
  const cs=getComputedStyle(document.documentElement);
  const ink=cs.getPropertyValue("--ink").trim(), acc=cs.getPropertyValue("--accent").trim(), soft=cs.getPropertyValue("--ink-soft").trim();
  const colors=[acc,ink,acc,soft];
  parts=Array.from({length:140},()=>({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.5,
    w:4+Math.random()*5,h:7+Math.random()*7,vy:2+Math.random()*3,vx:-1+Math.random()*2,
    r:Math.random()*Math.PI,vr:-.12+Math.random()*.24,c:colors[(Math.random()*colors.length)|0]}));
  const start=performance.now();
  (function loop(now){ cx.clearRect(0,0,cv.width,cv.height);
    for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.globalAlpha=.9;cx.fillStyle=p.c;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();}
    if(now-start<4200)raf=requestAnimationFrame(loop);else stopConfetti(); })(start); }
function stopConfetti(){if(raf)cancelAnimationFrame(raf);raf=null;cx.clearRect(0,0,cv.width,cv.height);}

/* -------- ajustes -------- */
let draft={};
function iconRow(el,current,onPick){
  el.innerHTML=ICONS_PICK.map(v=>`<button class="ipick" data-v="${v}" aria-pressed="${v===current}">${SVG(v,21)}</button>`).join("");
  el.querySelectorAll(".ipick").forEach(b=>b.addEventListener("click",()=>{
    el.querySelectorAll(".ipick").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true"); onPick(b.dataset.v); })); }
function openSettings(){ draft={icons:[...S.icons],theme:Theme.get(),size:S.size};
  $("#in-n0").value=S.names[0];$("#in-n1").value=S.names[1];
  iconRow($("#ic-0"),S.icons[0],v=>draft.icons[0]=v);
  iconRow($("#ic-1"),S.icons[1],v=>draft.icons[1]=v);
  segSel("#limit-opts",S.limit); segSel("#size-opts",S.size); segSel("#theme-opts",Theme.get());
  ["sound","vibe","badge","conf","fosforos"].forEach(k=>setSw("#sw-"+k,S[k]));
  $("#m-settings").classList.add("show");document.body.style.overflow="hidden"; }
function segSel(sel,val){ document.querySelectorAll(sel+" .seg-opt").forEach(o=>o.setAttribute("aria-selected",o.dataset.v==String(val))); }
function segVal(sel){ const o=document.querySelector(sel+' .seg-opt[aria-selected="true"]'); return o?o.dataset.v:null; }
function setSw(sel,on){ $(sel).setAttribute("aria-checked",on?"true":"false"); }
function swVal(sel){ return $(sel).getAttribute("aria-checked")==="true"; }

document.querySelectorAll(".toggle").forEach(sw=>{ sw.addEventListener("click",()=>{
  sw.setAttribute("aria-checked", sw.getAttribute("aria-checked")==="true"?"false":"true"); }); });
["#limit-opts","#size-opts","#theme-opts"].forEach(grp=>
  document.querySelectorAll(grp+" .seg-opt").forEach(o=>o.addEventListener("click",()=>{
    document.querySelectorAll(grp+" .seg-opt").forEach(x=>x.setAttribute("aria-selected","false"));
    o.setAttribute("aria-selected","true");
    if(grp==="#size-opts"){ draft.size=o.dataset.v; document.body.style.setProperty("--fsize",SIZES[o.dataset.v]); }
    if(grp==="#theme-opts"){ document.documentElement.setAttribute("data-theme",o.dataset.v); draft.theme=o.dataset.v; } })));

$("#btn-apply").addEventListener("click",()=>{
  S.names[0]=($("#in-n0").value.trim()||"Nosotros").slice(0,14);
  S.names[1]=($("#in-n1").value.trim()||"Ellos").slice(0,14);
  S.icons=[...draft.icons];
  Theme.set(segVal("#theme-opts")||Theme.get());
  S.size=segVal("#size-opts")||S.size; document.body.style.setProperty("--fsize",SIZES[S.size]);
  ["sound","vibe","badge","conf","fosforos"].forEach(k=>S[k]=swVal("#sw-"+k));
  const nl=+segVal("#limit-opts");
  $("#m-settings").classList.remove("show");document.body.style.overflow="";
  if(nl!==S.limit){ S.limit=nl; if(S.pts[0]||S.pts[1]){resetGame();save();return;} }
  renderAll(true); if(S.sound)sAdd(); });
$("#btn-newgame").addEventListener("click",()=>{ if(!S.pts[0]&&!S.pts[1]){resetGame();return;}
  if(confirm("¿Reiniciar el partido?"))resetGame(); });
$("#btn-settings").addEventListener("click",openSettings);
$("#btn-rev").addEventListener("click",resetGame);
$("#btn-undo").addEventListener("click",undo);
document.querySelectorAll(".modal").forEach(m=>m.addEventListener("click",e=>{
  if(e.target===m&&m.id!=="m-win"){ m.classList.remove("show");document.body.style.overflow="";
    document.documentElement.setAttribute("data-theme",Theme.get());document.body.style.setProperty("--fsize",SIZES[S.size]); } }));
document.addEventListener("keydown",e=>{ if(e.target.tagName==="INPUT")return; const k=e.key.toLowerCase();
  if(k==="q")score(0,1); if(k==="a")score(0,-1); if(k==="p")score(1,1); if(k==="l")score(1,-1); if(k==="z")undo(); });

/* -------- arranque -------- */
loadState(); Theme.init();
$("#btn-settings").innerHTML=SVG("settings",18);
$("#btn-undo").innerHTML=SVG("undo",16)+"Deshacer";
$("#log-caret").innerHTML=SVG("down",15);
document.body.style.setProperty("--fsize",SIZES[S.size]);
Icons.render(document);
buildBoard();
Shell.mount();
})();
</script>
</body>
