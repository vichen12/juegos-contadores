<!DOCTYPE html>
<html lang="es-AR" data-theme="noche">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1115">
<title>Vichen · Anotador de juegos</title>
<meta name="description" content="Vichen: anotadores de juegos de cartas (Truco, Magic y más). Funciona offline y guarda todo en tu celular.">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./assets/icons/favicon.png">
<link rel="apple-touch-icon" href="./assets/icons/vichen-apple.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vichen">
<script>(function(){try{var r=localStorage.getItem("vichen:theme:current");var t=r?JSON.parse(r).d:"noche";if(t!=="noche"&&t!=="dia")t="noche";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/tokens.css">
<link rel="stylesheet" href="./assets/css/base.css">
<link rel="stylesheet" href="./assets/css/components.css">
<link rel="stylesheet" href="./assets/css/shell.css">
<style>
  body{display:flex;flex-direction:column;overflow-x:hidden}
  .home{flex:1;width:100%;max-width:600px;margin:0 auto;padding:calc(70px + var(--safe-top)) 20px calc(36px + var(--safe-bottom));
    display:flex;flex-direction:column}

  .hero{text-align:center;margin-bottom:34px}
  .hero .logo{width:76px;height:76px;margin:0 auto 18px;border-radius:var(--r-3);display:grid;place-items:center;
    background:var(--accent);color:var(--accent-ink);box-shadow:var(--shadow-2)}
  .hero .logo svg{width:40px;height:40px}
  .hero h1{font-family:var(--serif);font-weight:600;font-size:clamp(40px,12vw,58px);letter-spacing:-.02em;line-height:1;color:var(--ink)}
  .hero .tag{margin:12px auto 0;max-width:34ch;color:var(--ink-soft);font-size:14.5px;line-height:1.55;text-wrap:balance}

  .apps{display:grid;grid-template-columns:1fr;gap:13px}
  @media(min-width:460px){.apps{grid-template-columns:1fr 1fr}}

  .app-card{
    all:unset;box-sizing:border-box;cursor:pointer;position:relative;overflow:hidden;
    background:var(--surface);border:1px solid var(--hair);border-radius:var(--r-3);box-shadow:var(--shadow-1);
    padding:20px;display:flex;flex-direction:column;gap:16px;
    transition:transform var(--dur-2) var(--ease), border-color var(--dur-1), box-shadow var(--dur-2), background var(--dur-1);
  }
  .app-card::before{content:"";position:absolute;inset:0;background:var(--sheen);opacity:0;transition:opacity var(--dur-2);pointer-events:none}
  .app-card:hover{transform:translateY(-3px);border-color:var(--hair-2);box-shadow:var(--shadow-2)}
  .app-card:hover::before{opacity:1}
  .app-card:active{transform:translateY(-1px) scale(.995)}
  .app-card .tile{width:56px;height:56px;border-radius:var(--r-2);display:grid;place-items:center;
    background:var(--accent-tint);color:var(--accent-text);transition:background var(--dur-2),color var(--dur-2)}
  .app-card .tile svg{width:28px;height:28px}
  .app-card:hover .tile{background:var(--accent);color:var(--accent-ink)}
  .app-card .txt{display:flex;flex-direction:column}
  .app-card .nm{font-family:var(--serif);font-weight:600;font-size:23px;color:var(--ink);line-height:1.05}
  .app-card .ds{font-size:13px;color:var(--ink-soft);line-height:1.45;margin-top:6px}
  .app-card .go{position:absolute;top:20px;right:18px;color:var(--ink-faint);display:inline-flex;transition:transform var(--dur-2) var(--ease),color var(--dur-1)}
  .app-card:hover .go{color:var(--accent-text);transform:translateX(3px)}

  .install-cta{display:none;margin:26px auto 0}
  .install-cta[data-show="1"]{display:inline-flex}

  .home-foot{margin-top:auto;padding-top:30px;text-align:center;color:var(--ink-faint);font-size:12px;letter-spacing:.02em;line-height:1.7}
  .home-foot .kbd{display:inline-grid;place-items:center;width:20px;height:20px;border-radius:6px;border:1px solid var(--hair);
    color:var(--ink-soft);vertical-align:-5px;margin:0 1px}
  .home-foot .kbd svg{width:13px;height:13px}
</style>
</head>
<body>

<main class="home">
  <header class="hero">
    <div class="logo" id="hero-logo"></div>
    <h1>Vichen</h1>
    <p class="tag">Anotá tus partidas con amigos.<br>Funciona sin internet y todo queda en tu celular.</p>
  </header>

  <div class="apps" id="apps"></div>

  <button class="btn btn--primary btn--lg install-cta" id="btn-install" hidden></button>

  <footer class="home-foot" id="home-foot"></footer>
</main>

<script src="./assets/js/store.js"></script>
<script src="./assets/js/registry.js"></script>
<script src="./assets/js/icons.js"></script>
<script src="./assets/js/theme.js"></script>
<script src="./assets/js/pwa.js"></script>
<script src="./assets/js/shell.js"></script>
<script>
(function(){
  "use strict";
  Theme.init();
  document.getElementById("hero-logo").innerHTML = Icons.svg("sparkles",{size:40});
  document.getElementById("btn-install").innerHTML = Icons.svg("install",{size:19}) + "Instalar Vichen";

  var box = document.getElementById("apps");
  Registry.apps.forEach(function(a){
    var card = document.createElement("button");
    card.className = "app-card";
    card.setAttribute("aria-label", a.name + " — " + a.tagline);
    card.innerHTML =
      '<span class="go">'+Icons.svg("arrowRight",{size:20})+'</span>' +
      '<span class="tile">'+Icons.svg(a.icon,{size:28})+'</span>' +
      '<span class="txt"><span class="nm">'+a.name+'</span><span class="ds">'+a.tagline+'</span></span>';
    card.addEventListener("click", function(){ location.href = a.href; });
    box.appendChild(card);
  });

  document.getElementById("home-foot").innerHTML =
    'Tocá <span class="kbd">'+Icons.svg("menu",{size:13})+'</span> para cambiar de app o de tema';

  Shell.mount();
})();
</script>
</body>
</html>
